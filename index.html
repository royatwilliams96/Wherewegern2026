<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Where We Gern?</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --sky-top:#6fd3ff;
    --sky-mid:#a9ecff;
    --sky-horizon:#eafcff;
    --sun:#ffd94a;
    --sun-glow:#fff3b0;
    --sea-deep:#0a8aad;
    --sea-mid:#12b0c9;
    --sea-shallow:#57dcd0;
    --foam:#d9fbf5;
    --sand:#f6e2b0;
    --sand-shadow:#e7cd89;
    --ink:#083a52;
    --ink-soft:#2d6a83;
    --coral:#ff6f57;
    --coral-dark:#ef5638;
    --hibiscus:#ff4d8d;
    --card:rgba(255,255,255,0.74);
    --card-line:rgba(255,255,255,0.9);
    --good:#1fb26a;
    --bad:#e8476b;
    --shadow:0 1.2rem 3.2rem rgba(8,58,82,0.22);
    font-size:62.5%;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Nunito",system-ui,sans-serif;
    color:var(--ink);
    min-height:100dvh;
    overflow:hidden;
    background:var(--sky-mid);
  }

  /* ===================== BEACH SCENE ===================== */
  .scene{position:fixed;inset:0;z-index:0;overflow:hidden;}

  .sky{
    position:absolute;inset:0;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 42%,var(--sky-horizon) 62%);
  }

  .sun{
    position:absolute;top:11%;left:50%;
    width:13rem;height:13rem;margin-left:-6.5rem;border-radius:50%;
    background:radial-gradient(circle at 50% 45%,#fff8d6 0%,var(--sun) 55%,#ffca3a 100%);
    box-shadow:0 0 6rem 2.4rem rgba(255,221,74,0.55),0 0 14rem 6rem rgba(255,221,74,0.28);
    animation:sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse{
    0%,100%{transform:scale(1);filter:brightness(1);}
    50%{transform:scale(1.05);filter:brightness(1.08);}
  }

  .cloud{
    position:absolute;background:#fff;border-radius:6rem;opacity:.85;
    filter:blur(.2rem);
    box-shadow:2.4rem .6rem 0 -.4rem #fff,-2.4rem .8rem 0 -.6rem #fff,5rem 1.2rem 0 -1rem #fff;
  }
  .cloud.c1{top:16%;width:11rem;height:3.2rem;animation:drift 46s linear infinite;}
  .cloud.c2{top:26%;width:8rem;height:2.4rem;opacity:.7;animation:drift 66s linear infinite;animation-delay:-20s;}
  .cloud.c3{top:9%;width:14rem;height:3.6rem;opacity:.65;animation:drift 84s linear infinite;animation-delay:-50s;}
  @keyframes drift{
    from{transform:translateX(-24rem);}
    to{transform:translateX(112vw);}
  }

  .sea{
    position:absolute;left:0;right:0;top:58%;bottom:11%;
    background:linear-gradient(180deg,var(--sea-shallow) 0%,var(--sea-mid) 45%,var(--sea-deep) 100%);
  }
  /* shimmering sun path on the water */
  .sun-path{
    position:absolute;left:50%;top:58%;bottom:11%;width:9rem;margin-left:-4.5rem;
    background:linear-gradient(180deg,rgba(255,248,214,.85),rgba(255,248,214,0));
    filter:blur(.6rem);opacity:.7;transform-origin:top center;
    animation:shimmer 4.5s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%,100%{opacity:.55;transform:scaleX(1);}
    50%{opacity:.9;transform:scaleX(1.25);}
  }

  .sparkles{position:absolute;left:0;right:0;top:58%;bottom:11%;overflow:hidden;}
  .sparkle{position:absolute;width:.5rem;height:.5rem;border-radius:50%;background:#fff;opacity:0;animation:twinkle 3.2s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:.9;transform:scale(1);}}

  /* rolling waves at the shoreline */
  .waves{position:absolute;left:0;right:0;bottom:9.5%;height:9rem;overflow:hidden;}
  .waves svg{position:absolute;left:0;width:200%;height:100%;}
  .waves .w1{animation:roll 9s linear infinite;fill:var(--foam);opacity:.85;}
  .waves .w2{animation:roll 14s linear infinite reverse;fill:#ffffff;opacity:.7;bottom:-1rem;}
  @keyframes roll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  .sand{
    position:absolute;left:0;right:0;bottom:0;height:12%;
    background:linear-gradient(180deg,#fdeecb 0%,var(--sand) 38%,var(--sand-shadow) 100%);
  }

  /* palm fronds sway from the corners */
  .palm{position:absolute;bottom:9%;width:22rem;height:26rem;pointer-events:none;}
  .palm.left{left:-3rem;transform-origin:bottom left;animation:sway 7s ease-in-out infinite;}
  .palm.right{right:-3rem;transform:scaleX(-1);transform-origin:bottom right;animation:sway 8.5s ease-in-out infinite;animation-delay:-2s;}
  @keyframes sway{0%,100%{transform:rotate(-1.4deg);}50%{transform:rotate(1.6deg);}}
  .palm.right{animation-name:swayR;}
  @keyframes swayR{0%,100%{transform:scaleX(-1) rotate(-1.4deg);}50%{transform:scaleX(-1) rotate(1.6deg);}}

  /* ===================== APP / CARDS ===================== */
  .stage{position:relative;z-index:2;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:2.4rem 1.8rem;}

  .card{
    position:relative;
    width:100%;max-width:52rem;background:var(--card);
    border:.15rem solid var(--card-line);
    border-radius:2.4rem;padding:3.2rem 2.8rem;
    box-shadow:var(--shadow);
    backdrop-filter:blur(1.4rem);-webkit-backdrop-filter:blur(1.4rem);
    animation:rise .5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(1.6rem) scale(.98);}to{opacity:1;transform:none;}}

  .screen{display:none;}
  .screen.active{display:block;}

  .wordmark{font-family:"Pacifico",cursive;font-size:clamp(3.6rem,9vw,5.4rem);line-height:1.22;text-align:center;color:var(--ink);
    text-shadow:0 .3rem 0 rgba(255,255,255,.65);padding-bottom:.6rem;}
  .tagline{text-align:center;font-size:1.6rem;font-weight:700;color:var(--ink-soft);letter-spacing:.02em;margin-top:1rem;text-transform:uppercase;}
  .subnote{text-align:center;font-size:1.5rem;color:var(--ink-soft);margin-top:1.6rem;line-height:1.5;}

  h2.title{font-family:"Fredoka",sans-serif;font-weight:600;font-size:2.8rem;color:var(--ink);text-align:center;}

  .btn{
    display:block;width:100%;font-family:"Fredoka",sans-serif;font-weight:600;
    font-size:1.9rem;padding:1.4rem 1.6rem;margin-top:1.4rem;border:none;border-radius:1.4rem;
    text-align:center;text-decoration:none;cursor:pointer;color:#fff;
    background:linear-gradient(180deg,var(--coral) 0%,var(--coral-dark) 100%);
    box-shadow:0 .6rem 1.6rem rgba(239,86,56,.4);
    transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
  }
  .btn:hover{transform:translateY(-.2rem);box-shadow:0 .9rem 2rem rgba(239,86,56,.5);filter:saturate(1.05);}
  .btn:active{transform:translateY(0);}
  .btn:focus-visible{outline:.3rem solid var(--ink);outline-offset:.3rem;}
  .btn.ghost{background:rgba(255,255,255,.85);color:var(--ink);box-shadow:0 .5rem 1.4rem rgba(8,58,82,.16);}
  .btn.ghost:hover{filter:none;}
  .btn.teal{background:linear-gradient(180deg,var(--sea-mid) 0%,var(--sea-deep) 100%);box-shadow:0 .6rem 1.6rem rgba(10,138,173,.4);}
  .end-top{display:flex;justify-content:flex-end;margin-bottom:.6rem;}
  .btn.corner{
    flex:0 0 auto;width:auto;margin-top:0;
    white-space:nowrap;
    font-size:1.3rem;padding:.7rem 1.1rem;border-radius:1rem;
    box-shadow:0 .3rem .9rem rgba(10,138,173,.35);
  }
  .btn.corner:hover{transform:translateY(-.1rem);}
  .btn[disabled]{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;filter:grayscale(.3);}

  .btn-row{margin-top:2.4rem;}

  /* HUD */
  .hud{display:flex;justify-content:space-between;align-items:flex-end;gap:1.4rem;margin-bottom:1.8rem;}
  .hud .label{font-size:1.3rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);}
  .progress-wrap{flex:1;}
  .progress-track{height:1.2rem;border-radius:1rem;background:rgba(8,58,82,.14);overflow:hidden;margin-top:.5rem;}
  .progress-fill{height:100%;width:0;border-radius:1rem;background:linear-gradient(90deg,var(--sea-shallow),var(--sea-mid));transition:width .4s cubic-bezier(.2,.8,.2,1);}
  .score-box{text-align:right;min-width:6rem;}
  .score-num{font-family:"Fredoka",sans-serif;font-weight:700;font-size:3.2rem;line-height:1;color:var(--coral-dark);}

  .question{font-family:"Fredoka",sans-serif;font-weight:500;font-size:2.2rem;line-height:1.3;color:var(--ink);margin-bottom:1.8rem;min-height:6rem;}

  .choices{display:flex;flex-direction:column;gap:.9rem;}
  .choice{display:flex;align-items:stretch;background:#fff;border-radius:1.2rem;overflow:hidden;cursor:pointer;
    box-shadow:0 .4rem 1.2rem rgba(8,58,82,.12);transition:transform .12s ease,box-shadow .12s ease;}
  .choice:hover{transform:translateY(-.2rem);box-shadow:0 .7rem 1.6rem rgba(8,58,82,.2);}
  .choice:focus-visible{outline:.3rem solid var(--sea-mid);outline-offset:.2rem;}
  .choice .prefix{display:flex;align-items:center;justify-content:center;min-width:4.4rem;font-family:"Fredoka",sans-serif;
    font-weight:700;font-size:1.9rem;color:#fff;background:linear-gradient(180deg,var(--sea-mid),var(--sea-deep));}
  .choice .text{padding:1.2rem 1.4rem;font-size:1.7rem;font-weight:600;color:var(--ink);}
  .choice.correct{background:var(--good);}
  .choice.correct .prefix{background:rgba(0,0,0,.12);}
  .choice.correct .text{color:#fff;}
  .choice.incorrect{background:var(--bad);animation:shake .4s;}
  .choice.incorrect .prefix{background:rgba(0,0,0,.12);}
  .choice.incorrect .text{color:#fff;}
  .choices.locked .choice{cursor:default;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-.6rem);}75%{transform:translateX(.6rem);}}

  /* END screen */
  .final-score{text-align:center;margin:1rem 0 2rem;}
  .final-score .big{font-family:"Fredoka",sans-serif;font-weight:700;font-size:6rem;line-height:1;color:var(--coral-dark);}
  .final-score .cap{font-size:1.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);}
  .field{width:100%;font-family:"Nunito",sans-serif;font-size:1.8rem;font-weight:600;padding:1.4rem 1.6rem;border:none;border-radius:1.2rem;
    background:#fff;box-shadow:0 .4rem 1.2rem rgba(8,58,82,.14);color:var(--ink);margin-top:.4rem;}
  .field::placeholder{color:#9fb4bd;}
  .field:focus-visible{outline:.3rem solid var(--sea-mid);outline-offset:.2rem;}
  .saved-tag{text-align:center;font-weight:800;color:var(--good);font-size:1.6rem;margin-top:1rem;display:none;}
  .saved-tag.show{display:block;}

  /* HIGH SCORES */
  .scores-list{list-style:none;margin:1.4rem 0 .6rem;display:flex;flex-direction:column;gap:.7rem;}
  .scores-list li{display:flex;align-items:center;gap:1.2rem;background:#fff;border-radius:1.2rem;padding:1.1rem 1.4rem;
    box-shadow:0 .4rem 1.2rem rgba(8,58,82,.1);}
  .rank{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.9rem;min-width:2.4rem;text-align:center;color:var(--sea-deep);}
  .rank.medal{font-size:2.2rem;}
  .sc-name{flex:1;font-weight:700;font-size:1.7rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sc-val{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.9rem;color:var(--coral-dark);}
  .empty{text-align:center;color:var(--ink-soft);font-size:1.6rem;padding:1.6rem 0;line-height:1.5;}

  @media (max-width:400px){
    .card{padding:2.4rem 1.8rem;}
    .question{font-size:2rem;}
    .palm{width:16rem;height:19rem;}
  }

  @media (prefers-reduced-motion:reduce){
    .sun,.cloud,.sun-path,.sparkle,.waves .w1,.waves .w2,.palm,.card,.choice.incorrect{animation:none!important;}
    .cloud{opacity:.75;}
  }
</style>
</head>
<body>
  <!-- ===================== ANIMATED BEACH SCENE ===================== -->
  <div class="scene" aria-hidden="true">
    <div class="sky"></div>
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="sea"></div>
    <div class="sun-path"></div>
    <div class="sparkles" id="sparkles"></div>
    <div class="waves">
      <svg class="w1" viewBox="0 0 1440 90" preserveAspectRatio="none"><path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,10 1440,10 L1440,90 L0,90 Z M1440,40 C1620,80 1800,0 1980,40 C2160,80 2340,0 2520,40 C2700,80 2880,10 2880,10 L2880,90 L1440,90 Z"/></svg>
      <svg class="w2" viewBox="0 0 1440 90" preserveAspectRatio="none"><path d="M0,55 C200,20 400,80 600,55 C800,30 1000,80 1200,55 C1320,40 1440,60 1440,60 L1440,90 L0,90 Z M1440,55 C1640,20 1840,80 2040,55 C2240,30 2440,80 2640,55 C2760,40 2880,60 2880,60 L2880,90 L1440,90 Z"/></svg>
    </div>
    <div class="sand"></div>
    <svg class="palm left" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">
      <path d="M104 260 C100 190 96 130 92 78" stroke="#7a4a22" stroke-width="9" fill="none" stroke-linecap="round"/>
      <g fill="#1f9d55">
        <path d="M92 74 C60 40 30 34 6 44 C34 44 60 56 88 82 Z"/>
        <path d="M92 74 C118 34 150 26 182 40 C150 38 122 52 96 82 Z"/>
        <path d="M92 76 C56 66 26 78 8 104 C36 90 66 88 92 92 Z"/>
        <path d="M92 76 C126 62 160 70 186 96 C158 82 124 84 96 92 Z"/>
        <path d="M92 72 C86 40 92 16 110 2 C102 26 100 52 100 78 Z"/>
      </g>
      <g fill="#7a4a22"><circle cx="86" cy="80" r="5"/><circle cx="96" cy="82" r="5"/><circle cx="91" cy="88" r="5"/></g>
    </svg>
    <svg class="palm right" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">
      <path d="M104 260 C100 190 96 130 92 78" stroke="#7a4a22" stroke-width="9" fill="none" stroke-linecap="round"/>
      <g fill="#188f4c">
        <path d="M92 74 C60 40 30 34 6 44 C34 44 60 56 88 82 Z"/>
        <path d="M92 74 C118 34 150 26 182 40 C150 38 122 52 96 82 Z"/>
        <path d="M92 76 C56 66 26 78 8 104 C36 90 66 88 92 92 Z"/>
        <path d="M92 76 C126 62 160 70 186 96 C158 82 124 84 96 92 Z"/>
        <path d="M92 72 C86 40 92 16 110 2 C102 26 100 52 100 78 Z"/>
      </g>
      <g fill="#7a4a22"><circle cx="86" cy="80" r="5"/><circle cx="96" cy="82" r="5"/><circle cx="91" cy="88" r="5"/></g>
    </svg>
  </div>

  <!-- ===================== APP ===================== -->
  <div class="stage">
    <div class="card">

      <!-- HOME -->
      <section id="home" class="screen active">
        <h1 class="wordmark">Where We Gern?</h1>
        <p class="tagline">A Bahamas Island Quiz</p>
        <p class="subnote">10 questions, 10 points each. How well do you know the 700 islands?</p>
        <div class="btn-row">
          <button class="btn" onclick="startGame()">Play</button>
          <button class="btn ghost" onclick="showScreen('scores'); renderScores();">High Scores</button>
        </div>
      </section>

      <!-- GAME -->
      <section id="game" class="screen">
        <div class="hud">
          <div class="progress-wrap">
            <div class="label">Question <span id="progressText">1/10</span></div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          </div>
          <div class="score-box">
            <div class="label">Score</div>
            <div class="score-num" id="score">0</div>
          </div>
        </div>
        <p class="question" id="question">Loading…</p>
        <div class="choices" id="choices">
          <div class="choice" data-number="1" tabindex="0" role="button"><span class="prefix">A</span><span class="text"></span></div>
          <div class="choice" data-number="2" tabindex="0" role="button"><span class="prefix">B</span><span class="text"></span></div>
          <div class="choice" data-number="3" tabindex="0" role="button"><span class="prefix">C</span><span class="text"></span></div>
          <div class="choice" data-number="4" tabindex="0" role="button"><span class="prefix">D</span><span class="text"></span></div>
        </div>
      </section>

      <!-- END -->
      <section id="end" class="screen">
        <div class="end-top">
          <button class="btn teal corner" onclick="showScreen('scores'); renderScores();">🏆 Leaderboard</button>
        </div>
        <h2 class="title">Conch out! 🐚</h2>
        <div class="final-score">
          <div class="big" id="finalScore">0</div>
          <div class="cap">Your score</div>
        </div>
        <input class="field" id="username" type="text" maxlength="16" placeholder="Enter your name" autocomplete="off" />
        <button class="btn" id="saveBtn" onclick="saveScore()" disabled>Save score</button>
        <div class="saved-tag" id="savedTag">Saved to the leaderboard! 🌴</div>
        <div class="btn-row">
          <button class="btn ghost" onclick="startGame()">Play again</button>
          <button class="btn ghost" onclick="showScreen('home')">Home</button>
        </div>
      </section>

      <!-- HIGH SCORES -->
      <section id="scores" class="screen">
        <h2 class="title">Top of the Tide 🏖️</h2>
        <ul class="scores-list" id="scoresList"></ul>
        <div class="btn-row">
          <button class="btn" onclick="startGame()">Play</button>
          <button class="btn ghost" onclick="showScreen('home')">Home</button>
        </div>
      </section>

    </div>
  </div>

<script>
  /* ---------- questions (from the original quiz) ---------- */
  const QUESTIONS = [
    {question:"Which island has the highest point above sea level?",choice1:"Cat Island",choice2:"Rum Cay",choice3:"Andros",choice4:"Long Island",answer:1},
    {question:"On which island is the Shrimp hole located?",choice1:"Paradise Island",choice2:"Grand Bahama",choice3:"Long Island",choice4:"Abaco",answer:3},
    {question:"Which islands in The Bahamas are geographically the closest?",choice1:"Andros and New Providence",choice2:"Abaco and Grand Bahama",choice3:"Mayaguana and Inagua",choice4:"Acklins and Crooked Island",answer:4},
    {question:"What is the meaning of Eleuthera in Greek?",choice1:"Courage",choice2:"Freedom",choice3:"Strength",choice4:"Peace",answer:2},
    {question:"Where is the famous Candy striped lighthouse located?",choice1:"Ragged Island",choice2:"Inagua",choice3:"Abaco",choice4:"New Providence",answer:3},
    {question:"Which island in The Bahamas has the biggest underwater cave system?",choice1:"Grand Bahama",choice2:"Paradise Island",choice3:"Eleuthera",choice4:"Andros",answer:1},
    {question:"Birthplace of Rake and Scrape?",choice1:"Andros",choice2:"New Providence",choice3:"Long Island",choice4:"Cat Island",answer:4},
    {question:"How many National Parks are in The Bahamas?",choice1:"11",choice2:"5",choice3:"14",choice4:"21",answer:3},
    {question:"What is the largest national park in The Bahamas?",choice1:"Botanical Gardens",choice2:"Bahamas National Trust",choice3:"Abaco National Park",choice4:"The Inagua National park",answer:4},
    {question:"Where is Preacher's cave located?",choice1:"Eleuthera",choice2:"Cat Island",choice3:"Bimini",choice4:"Rum Cay",answer:1},
    {question:"Abrahams Bay is the main settlement of _____.",choice1:"Bimini",choice2:"Mayaguana",choice3:"Cat Island",choice4:"Rum Cay",answer:2},
    {question:"______ is home to the Gerace Research Center that focuses on Archaeology, biology, geology and marine science.",choice1:"Inagua",choice2:"Eleuthera",choice3:"Bimini",choice4:"San Salvador",answer:4},
    {question:"Yahaka is the original name of which island?",choice1:"Acklins",choice2:"San Salvador",choice3:"New Providence",choice4:"Paradise Island",answer:1},
    {question:"The Dolphin house Museum is located on which island?",choice1:"Ragged Island",choice2:"Grand Bahama",choice3:"Eleuthera",choice4:"Bimini",answer:4},
    {question:"______ is home to the first post office in The Bahamas.",choice1:"Grand Bahama",choice2:"Crooked island",choice3:"New Providence",choice4:"Eleuthera",answer:2},
    {question:"Chub Cay is the southernmost cay in which chain of islands?",choice1:"Bimini Islands",choice2:"Exuma Islands",choice3:"The Berry Islands",choice4:"Long Island",answer:3},
    {question:"Crown Haven is a settlement found on which island?",choice1:"Bimini",choice2:"Great Harbour Cay",choice3:"Rum Cay",choice4:"Abaco",answer:4},
    {question:"Where was the first regatta held in The Bahamas?",choice1:"Deadman's Cay, Long Island",choice2:"Marsh Harbour, Abaco",choice3:"Elizabeth Harbor, Exuma",choice4:"Fresh Creek, Andros",answer:3},
    {question:"Twin tower churches, St Peter and St Pauls Catholic Church, can be found on which island?",choice1:"Long Island",choice2:"Eleuthera",choice3:"San Salvador",choice4:"Cat Island",answer:1},
    {question:"Inagua has the highest number of bird species, which island is second?",choice1:"New Providence",choice2:"Grand Bahama",choice3:"San Salvador",choice4:"Eleuthera",answer:2},
    {question:"What is the name of the only settlement on the west coast of Andros?",choice1:"Black Point",choice2:"Conch Sound",choice3:"Morgan's Bluff",choice4:"Red Bays Village",answer:4}
  ];

  const CORRECT_BONUS = 10;
  const MAX_QUESTIONS = 10;
  const MAX_HIGH_SCORES = 8;

  /* ---------- state ---------- */
  let score = 0, questionCounter = 0, currentQuestion = {}, available = [], accepting = false, lastScore = 0;

  const el = {
    question: document.getElementById("question"),
    choices: document.getElementById("choices"),
    choiceEls: Array.from(document.querySelectorAll("#choices .choice")),
    progressText: document.getElementById("progressText"),
    progressFill: document.getElementById("progressFill"),
    score: document.getElementById("score"),
    finalScore: document.getElementById("finalScore"),
    username: document.getElementById("username"),
    saveBtn: document.getElementById("saveBtn"),
    savedTag: document.getElementById("savedTag"),
    scoresList: document.getElementById("scoresList"),
  };

  /* ---------- screen router ---------- */
  function showScreen(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    // re-trigger the card rise animation
    const card = document.querySelector(".card");
    card.style.animation = "none"; void card.offsetWidth; card.style.animation = "";
  }

  /* ---------- game ---------- */
  function startGame(){
    score = 0; questionCounter = 0;
    available = [...QUESTIONS];
    el.score.innerText = "0";
    showScreen("game");
    nextQuestion();
  }

  function nextQuestion(){
    if(available.length === 0 || questionCounter >= MAX_QUESTIONS){
      return endGame();
    }
    questionCounter++;
    el.progressText.innerText = `${questionCounter}/${MAX_QUESTIONS}`;
    el.progressFill.style.width = `${(questionCounter/MAX_QUESTIONS)*100}%`;

    const idx = Math.floor(Math.random()*available.length);
    currentQuestion = available[idx];
    el.question.innerText = currentQuestion.question;
    el.choiceEls.forEach(c => {
      const n = c.dataset.number;
      c.querySelector(".text").innerText = currentQuestion["choice"+n];
      c.classList.remove("correct","incorrect");
    });
    el.choices.classList.remove("locked");
    available.splice(idx,1);
    accepting = true;
  }

  function pick(choiceEl){
    if(!accepting) return;
    accepting = false;
    el.choices.classList.add("locked");
    const selected = Number(choiceEl.dataset.number);
    const isCorrect = selected === currentQuestion.answer;
    choiceEl.classList.add(isCorrect ? "correct" : "incorrect");
    if(!isCorrect){
      // also reveal the right answer
      const right = el.choiceEls.find(c => Number(c.dataset.number) === currentQuestion.answer);
      if(right) right.classList.add("correct");
    } else {
      score += CORRECT_BONUS;
      el.score.innerText = score;
    }
    setTimeout(nextQuestion, 1000);
  }

  el.choiceEls.forEach(c => {
    c.addEventListener("click", () => pick(c));
    c.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); pick(c);} });
  });

  function endGame(){
    lastScore = score;
    el.finalScore.innerText = score;
    el.username.value = "";
    el.saveBtn.disabled = true;
    el.savedTag.classList.remove("show");
    showScreen("end");
    el.username.focus();
  }

  el.username.addEventListener("input", () => {
    el.saveBtn.disabled = el.username.value.trim().length === 0;
  });
  el.username.addEventListener("keydown", e => {
    if(e.key === "Enter" && !el.saveBtn.disabled) saveScore();
  });

  /* ---------- high scores (global, via Netlify Function + Blobs) ----------
     GET  /api/scores            -> returns the top scores as JSON
     POST /api/scores {name,score} -> validates + stores, returns the board
  ------------------------------------------------------------------------ */
  const API_URL = "/api/scores";

  async function loadScores(){
    const res = await fetch(API_URL, { headers: { "accept": "application/json" } });
    if(!res.ok) throw new Error("Could not load scores.");
    return res.json();
  }

  async function saveScore(){
    const name = el.username.value.trim();
    if(!name) return;
    el.saveBtn.disabled = true;
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ name, score: lastScore }),
      });
      if(!res.ok) throw new Error("save failed");
      el.savedTag.textContent = "Saved to the leaderboard! 🌴";
      el.savedTag.style.color = "";
      el.savedTag.classList.add("show");
    } catch {
      el.savedTag.textContent = "Couldn't save — check your connection and try again.";
      el.savedTag.style.color = "var(--bad)";
      el.savedTag.classList.add("show");
      el.saveBtn.disabled = false; // let them retry
    }
  }

  async function renderScores(){
    el.scoresList.innerHTML = `<li><div class="empty">Loading the board… 🌊</div></li>`;
    let scores;
    try {
      scores = await loadScores();
    } catch {
      el.scoresList.innerHTML = `<li><div class="empty">Couldn't reach the leaderboard right now. 🐡<br>Try again in a moment.</div></li>`;
      return;
    }
    if(!scores || scores.length === 0){
      el.scoresList.innerHTML = `<li><div class="empty">No scores yet — be the first to make the board! 🐠</div></li>`;
      return;
    }
    const medals = ["🥇","🥈","🥉"];
    el.scoresList.innerHTML = scores.slice(0, MAX_HIGH_SCORES).map((s,i) => `
      <li>
        <span class="rank ${i<3?'medal':''}">${i<3 ? medals[i] : (i+1)}</span>
        <span class="sc-name">${escapeHtml(s.name)}</span>
        <span class="sc-val">${s.score}</span>
      </li>`).join("");
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- sparkles on the water ---------- */
  (function makeSparkles(){
    const wrap = document.getElementById("sparkles");
    const n = 22;
    for(let i=0;i<n;i++){
      const s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = Math.random()*100 + "%";
      s.style.top = Math.random()*100 + "%";
      s.style.animationDelay = (Math.random()*3.2).toFixed(2) + "s";
      wrap.appendChild(s);
    }
  })();
</script>
</body>
</html>
